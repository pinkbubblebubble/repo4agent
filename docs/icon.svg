<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="url(#bg)" />

  <!-- Grid texture -->
  <g opacity="0.08" stroke="#6366f1" stroke-width="0.5">
    <line x1="20" y1="0" x2="20" y2="120" />
    <line x1="40" y1="0" x2="40" y2="120" />
    <line x1="60" y1="0" x2="60" y2="120" />
    <line x1="80" y1="0" x2="80" y2="120" />
    <line x1="100" y1="0" x2="100" y2="120" />
    <line x1="0" y1="20" x2="120" y2="20" />
    <line x1="0" y1="40" x2="120" y2="40" />
    <line x1="0" y1="60" x2="120" y2="60" />
    <line x1="0" y1="80" x2="120" y2="80" />
    <line x1="0" y1="100" x2="120" y2="100" />
  </g>

  <!-- Glow blob behind repo icon -->
  <ellipse cx="60" cy="58" rx="28" ry="22" fill="url(#glow)" filter="url(#blur)" />

  <!-- Repository shape: folder base -->
  <rect x="28" y="48" width="64" height="38" rx="5" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <!-- Folder tab -->
  <path d="M28 48 L28 44 Q28 42 30 42 L50 42 L56 48 Z" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linejoin="round"/>

  <!-- Neural nodes inside folder -->
  <circle cx="45" cy="60" r="3.5" fill="url(#accent)" opacity="0.9"/>
  <circle cx="60" cy="54" r="3.5" fill="url(#accent)" opacity="0.9"/>
  <circle cx="75" cy="60" r="3.5" fill="url(#accent)" opacity="0.9"/>
  <circle cx="52" cy="72" r="3.5" fill="url(#accent)" opacity="0.9"/>
  <circle cx="68" cy="72" r="3.5" fill="url(#accent)" opacity="0.9"/>

  <!-- Connections between nodes -->
  <g stroke="url(#accent)" stroke-width="1.2" opacity="0.6">
    <line x1="45" y1="60" x2="60" y2="54"/>
    <line x1="60" y1="54" x2="75" y2="60"/>
    <line x1="45" y1="60" x2="52" y2="72"/>
    <line x1="60" y1="54" x2="52" y2="72"/>
    <line x1="60" y1="54" x2="68" y2="72"/>
    <line x1="75" y1="60" x2="68" y2="72"/>
    <line x1="52" y1="72" x2="68" y2="72"/>
  </g>

  <!-- Small sparkle dots: agent activity -->
  <circle cx="38" cy="35" r="1.5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="82" cy="32" r="1" fill="#6366f1" opacity="0.6"/>
  <circle cx="92" cy="42" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="28" cy="28" r="1" fill="#6366f1" opacity="0.4"/>
</svg>
